name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  docker-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Docker image
        run: docker build -t apex-test .

  docker-build-archive:
    name: docker-build (archive)
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download release source archive
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          curl -sL "https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz" | tar xz
          mv *APEX* apex-source

      - name: Build Docker image from archive
        run: docker build -t apex-test ./apex-source
